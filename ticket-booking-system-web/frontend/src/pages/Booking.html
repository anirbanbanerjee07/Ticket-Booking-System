<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Ticket</title>
  <link rel="stylesheet" href="../services/Booking.css">
  <script src="../services/api.js"></script>
  <script src="../services/Booking.js" defer></script>
</head>
<body>
  <header>
    <h2 id="title">🎫 Book Ticket</h2>
  </header>

  <div class="top-controls">
    <button class="toggle-btn" id="langToggle">🌐 Hindi</button>
    <button class="toggle-btn" id="modeToggle">🌙 Dark</button>
  </div>

  <div class="container">
    <form id="bookForm">
      <label id="seatsLabel">Seats:</label>
      <input type="number" id="seats" placeholder="Enter number of seats" required>
      <button type="submit" class="btn">✅ Confirm Booking</button>
    </form>
    <p id="msg"></p>
  </div>
</body>
</html>
