<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <!-- Correct path: go up from pages/ → into services/ -->
  <link rel="stylesheet" href="../services/Register.css">
  <script src="../services/api.js" defer></script>
  <script src="../services/Register.js" defer></script>
</head>
<body>
  <header>
    <h2>📝 Register</h2>
  </header>

  <!-- Controls -->
  <div class="top-controls">
    <button id="langToggle" class="toggle-btn">🌐 हिंदी</button>
    <button id="themeToggle" class="toggle-btn">🌙 Dark</button>
  </div>

  <!-- Form -->
  <div class="container">
    <form id="registerForm" action="register.php" method="post">
      <label for="name" data-en="Full Name:" data-hi="पूरा नाम:">Full Name:</label><br>
      <input type="text" id="name" placeholder="Enter your full name" required><br><br>

      <label for="email" data-en="Email:" data-hi="ईमेल:">Email:</label><br>
      <input type="email" id="email" placeholder="Enter your email address" required><br><br>

      <label for="password" data-en="Password:" data-hi="पासवर्ड:">Password:</label><br>
      <input type="password" id="password" placeholder="Create a password" required><br><br>

      <label for="confirmPassword" data-en="Confirm Password:" data-hi="पासवर्ड की पुष्टि करें:">Confirm Password:</label><br>
      <input type="password" id="confirmPassword" placeholder="Re-enter your password" required><br><br>

      <div class="btn-group">
        <button type="submit" class="btn primary">✅ Register</button>
        <button type="reset" class="btn secondary">🧹 Clear</button>
        <a href="Login.html" class="btn link">🔑 Login</a>
      </div>
    </form>
    <p id="msg"></p>
  </div>
</body>
</html>
